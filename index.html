    <style>
      :root {
        --bg-0: #020617;
        --bg-1: #0f172a;
        --bg-2: #1e293b;
        --bg-3: #334155;
        --text-dim: #94a3b8;
      }

      * {
        box-sizing: border-box;
        font-family: "Outfit", sans-serif;
      }

      body {
        margin: 0;
        background:
          radial-gradient(circle at top left, rgba(251, 191, 36, 0.14), transparent 28%),
          radial-gradient(circle at top right, rgba(244, 63, 94, 0.16), transparent 26%),
          linear-gradient(180deg, #0f172a 0%, #020617 100%);
      }

      .custom-marker {
        background: none;
        border: none;
      }

      .marker-pin {
        width: 36px;
        height: 36px;
        border-radius: 50% 50% 50% 0;
        transform: rotate(-45deg);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 8px 22px rgba(15, 23, 42, 0.45);
        transition: transform 0.2s ease, box-shadow 0.2s ease;
        cursor: pointer;
      }

      .marker-pin:hover {
        transform: rotate(-45deg) scale(1.12);
        box-shadow: 0 10px 28px rgba(15, 23, 42, 0.52);
      }

      .marker-icon {
        transform: rotate(45deg);
        font-size: 16px;
      }

      .leaflet-popup-content-wrapper {
        border-radius: 18px;
        padding: 0;
        overflow: hidden;
        box-shadow: 0 16px 44px rgba(2, 6, 23, 0.4);
      }

      .leaflet-popup-content {
        margin: 0;
        min-width: 280px;
        max-width: 320px;
      }

      .leaflet-popup-tip {
        background: #1e293b;
      }

      .day-badge {
        padding: 4px 8px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
      }

      .day-active {
        background: #10b981;
        color: white;
      }

      .day-inactive {
        background: #374151;
        color: #9ca3af;
      }

      .filter-btn {
        transition:
          all 0.2s ease,
          transform 0.2s ease;
      }

      .filter-btn:hover {
        transform: translateY(-1px);
      }

      .filter-btn.active {
        box-shadow: 0 8px 20px rgba(15, 23, 42, 0.22);
      }

      #map {
        background:
          radial-gradient(circle at 30% 20%, rgba(251, 191, 36, 0.1), transparent 30%),
          linear-gradient(135deg, #e2e8f0 0%, #cbd5e1 100%);
      }

      .venue-card {
        transition:
          transform 0.2s ease,
          background 0.2s ease,
          border-color 0.2s ease;
      }

      .venue-card:hover {
        transform: translateY(-1px);
        background: rgba(255, 255, 255, 0.09);
        border-color: rgba(251, 191, 36, 0.4);
      }

      .line-clamp-2 {
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      .glass-panel {
        background: rgba(15, 23, 42, 0.78);
        backdrop-filter: blur(14px);
      }

      .empty-state {
        border: 1px dashed rgba(148, 163, 184, 0.3);
      }

      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }

      ::-webkit-scrollbar-track {
        background: rgba(15, 23, 42, 0.35);
        border-radius: 999px;
      }

      ::-webkit-scrollbar-thumb {
        background: rgba(203, 213, 225, 0.25);
        border-radius: 999px;
      }

      @media (max-width: 1023px) {
        #map {
          min-height: 100%;
        }
      }
    </style>

        { name: "Michi Ramen Bar", category: "Bar / Restaurant", address: "137 W Front St, Missoula, MT 59802", lat: 46.8702903, lng: -113.9964472, days: { sunday: false, monday: true, tuesday: true, wednesday: true, thursday: true, friday: true, saturday: false }, happyHourDays: "Mon–Fri", startTime: "2:00 PM", endTime: "5:00 PM", startTimeMinutes: 14 * 60, endTimeMinutes: 17 * 60, dealType: "Food & Drink", dealHighlight: "Ramen or rice bowl + drink $20, draft beer $5, well drinks $5, draft cocktails $7, house sake $4", notes: "Combo includes draft beer or draft cocktail. House sake served in 4 oz pours. Select appetizers discounted." },
        { name: "M-80 Chicken", category: "Restaurant", address: "222 W Main St, Missoula, MT 59802", lat: 46.8721218, lng: -113.9967034, days: { sunday: true, monday: true, tuesday: true, wednesday: true, thursday: true, friday: true, saturday: true }, happyHourDays: "Daily", startTime: "3:00 PM", endTime: "6:00 PM", startTimeMinutes: 15 * 60, endTimeMinutes: 18 * 60, dealType: "Food & Drink", dealHighlight: "$15 loaded fries, half order of wings & a beer for $11", notes: "" },
        { name: "Kettlehouse Brewing", category: "Brewery", address: "605 Cold Smoke Ave, Bonner, MT 59823", lat: 46.8758622, lng: -113.8629942, days: { sunday: true, monday: true, tuesday: true, wednesday: true, thursday: true, friday: true, saturday: true }, happyHourDays: "Daily", startTime: "3:00 PM", endTime: "6:00 PM", startTimeMinutes: 15 * 60, endTimeMinutes: 18 * 60, dealType: "Food & Drink", dealHighlight: "Bites starting at $4, pints starting at $5.50", notes: "" },
        { name: "Tamarack Brewing Co", category: "Brewery", address: "231 W Front St, Missoula, MT 59802", lat: 46.8709687, lng: -113.9973373, days: { sunday: false, monday: true, tuesday: true, wednesday: true, thursday: true, friday: true, saturday: false }, happyHourDays: "Mon–Fri", startTime: "2:00 PM", endTime: "5:00 PM", startTimeMinutes: 14 * 60, endTimeMinutes: 17 * 60, dealType: "Food & Drink", dealHighlight: "Flagship beer pints $4.50, happy hour cocktails $5, burgers $7.90, sliders $6.50, wings $8.90", notes: "Discounted food includes beef or fried chicken sliders, half-order wings, mac & cheese, garlic bleu fries, and chips & guac. Beermosa (10 oz) also discounted." },
        { name: "Le Petit", category: "Restaurant", address: "529 S Higgins Ave, Missoula, MT 59801", lat: 46.8662514, lng: -113.9976829, days: { sunday: false, monday: true, tuesday: true, wednesday: true, thursday: true, friday: true, saturday: false }, happyHourDays: "Mon–Fri", startTime: "1:00 PM", endTime: "4:00 PM", startTimeMinutes: 13 * 60, endTimeMinutes: 16 * 60, dealType: "Food & Drink", dealHighlight: "Daily rotating specials: Mon $2.50 Americano | Tue Buy 1 Get 1 50% Off Espresso Drinks | Wed $1 off Hearth Loaves | Thu FREE 8oz drip with pastry | Fri $0.75 off Pizza Dough", notes: "Weekday Winter Happy Hour with different deal each day" },
        { name: "Mustard Seed", category: "Bar", address: "2901 Brooks St Suite OUT1, Missoula, MT 59801", lat: 46.84472338, lng: -114.0277884, days: { sunday: false, monday: true, tuesday: true, wednesday: true, thursday: true, friday: true, saturday: false }, happyHourDays: "Mon–Fri", startTime: "3:00 PM", endTime: "6:00 PM", startTimeMinutes: 15 * 60, endTimeMinutes: 18 * 60, dealType: "Food & Drink", dealHighlight: "Dim sum $4.25–$6.50, wine $1 off, specialty drinks $2 off", notes: "Dim sum items include spring rolls, California rolls, char siu pork, gyoza, shrimp wontons, pork wontons, Asian glazed pork ribs, and Big Island wings. Happy hour also runs 8 pm–close (bar only)." },
      ];

      let map;
      let markers = [];
      let currentCategory = "all";
      let currentDay = "all";
      let currentTimeRange = { start: 0, end: 23 * 60 + 59 };
      let mobileOpen = false;

      function getCategoryColor(category) {
        switch (category) {
          case "Bar":
            return "#a855f7";
          case "Bar / Restaurant":
            return "#10b981";
          case "Restaurant":
            return "#f59e0b";
          case "Brewery":
            return "#f43f5e";
          case "Distillery":
            return "#8b5cf6";
          default:
            return "#6366f1";
        }
      }

      function getCategoryIcon(category) {
        switch (category) {
          case "Bar":
            return "🍸";
          case "Bar / Restaurant":
            return "🍻";
          case "Restaurant":
            return "🍴";
          case "Brewery":
            return "🍺";
          case "Distillery":
            return "🥃";
          default:
            return "📍";
        }
      }

      function createCustomIcon(category) {
        const color = getCategoryColor(category);
        const icon = getCategoryIcon(category);

        return L.divIcon({
          className: "custom-marker",
          html: `
            <div class="marker-pin" style="background:${color};">
              <span class="marker-icon">${icon}</span>
            </div>
          `,
          iconSize: [36, 36],
          iconAnchor: [18, 36],
          popupAnchor: [0, -36],
        });
      }

      function createPopupContent(venue) {
        const color = getCategoryColor(venue.category);
        const dayNames = ["sunday", "monday", "tuesday", "wednesday", "thursday", "friday", "saturday"];
        const dayLabels = ["S", "M", "T", "W", "T", "F", "S"];

        const dayBadges = dayNames
          .map((day, i) => {
            const isActive = venue.days[day];
            return `<span class="day-badge ${isActive ? "day-active" : "day-inactive"}">${dayLabels[i]}</span>`;
          })
          .join("");

        return `
          <div class="bg-slate-800 text-white">
            <div class="border-b border-slate-700 p-4" style="background:linear-gradient(135deg, ${color}22, ${color}44);">
              <div class="flex items-start justify-between gap-2">
                <h3 class="text-lg font-bold leading-tight">${venue.name}</h3>
                <span class="text-2xl">${getCategoryIcon(venue.category)}</span>
              </div>
              <p class="mt-1 text-sm text-slate-300">${venue.category}</p>
            </div>
            <div class="space-y-3 p-4">
              <div>
                <p class="mb-1 text-xs font-semibold uppercase text-slate-400">Address</p>
                <p class="text-sm text-slate-200">${venue.address}</p>
              </div>
              <div>
                <p class="mb-2 text-xs font-semibold uppercase text-slate-400">Happy Hour Days</p>
                <div class="flex gap-1">${dayBadges}</div>
              </div>
              <div class="flex gap-4">
                <div>
                  <p class="mb-1 text-xs font-semibold uppercase text-slate-400">Time</p>
                  <p class="text-sm font-medium" style="color:${color}">${venue.startTime} – ${venue.endTime}</p>
                </div>
                <div>
                  <p class="mb-1 text-xs font-semibold uppercase text-slate-400">Deal Type</p>
                  <p class="text-sm text-slate-200">${venue.dealType}</p>
                </div>
              </div>
              <div class="rounded-lg bg-slate-700/50 p-3">
                <p class="mb-1 text-xs font-semibold uppercase text-slate-400">Deals</p>
                <p class="text-sm text-slate-100">${venue.dealHighlight}</p>
              </div>
              ${venue.notes ? `<div class="text-xs italic text-slate-400">Tip: ${venue.notes}</div>` : ""}
            </div>
          </div>
        `;
      }

      function createVenueCard(venue, index) {
        const color = getCategoryColor(venue.category);
        const highlight = venue.dealHighlight.length > 72 ? `${venue.dealHighlight.slice(0, 72)}...` : venue.dealHighlight;

        return `
          <div class="venue-card cursor-pointer rounded-xl border border-transparent bg-slate-700/50 p-3" onclick="focusVenue(${index})">
            <div class="flex items-start gap-3">
              <div class="flex h-10 w-10 flex-shrink-0 items-center justify-center rounded-lg text-xl" style="background:${color}33;">
                ${getCategoryIcon(venue.category)}
              </div>
              <div class="min-w-0 flex-1">
                <h3 class="truncate text-sm font-semibold">${venue.name}</h3>
                <p class="truncate text-xs text-slate-400">${venue.happyHourDays} • ${venue.startTime}–${venue.endTime}</p>
                <p class="line-clamp-2 mt-1 text-xs text-slate-300">${highlight}</p>
              </div>
            </div>
          </div>
        `;
      }

      function isTimeInRange(venueStart, venueEnd, filterStart, filterEnd) {
        if (filterStart <= filterEnd) {
          return venueStart <= filterEnd && venueEnd >= filterStart;
        }

        return (
          (venueStart <= 1439 && venueEnd >= filterStart) ||
          (venueStart <= filterEnd && venueEnd >= 0)
        );
      }

      function formatMinutes(minutes) {
        const normalized = ((minutes % 1440) + 1440) % 1440;
        const hours = Math.floor(normalized / 60);
        const mins = normalized % 60;
        const suffix = hours >= 12 ? "PM" : "AM";
        const displayHours = hours % 12 || 12;
        return `${displayHours}:${String(mins).padStart(2, "0")} ${suffix}`;
      }

      function getFiltersSummary(filteredCount) {
        const parts = [];

        if (currentCategory !== "all") parts.push(currentCategory);
        if (currentDay !== "all") parts.push(currentDay.charAt(0).toUpperCase() + currentDay.slice(1));

        const allDay = currentTimeRange.start === 0 && currentTimeRange.end === 1439;
        if (!allDay) {
          parts.push(`${formatMinutes(currentTimeRange.start)} to ${formatMinutes(currentTimeRange.end)}`);
        }

        if (!parts.length) {
          return `Showing all ${filteredCount} venues.`;
        }

        return `Showing ${filteredCount} venue${filteredCount === 1 ? "" : "s"} for ${parts.join(" • ")}.`;
      }

      function filterVenues() {
        return venues.filter((venue) => {
          const categoryMatch = currentCategory === "all" || venue.category === currentCategory;
          const dayMatch = currentDay === "all" || venue.days[currentDay];
          const timeMatch = isTimeInRange(
            venue.startTimeMinutes,
            venue.endTimeMinutes,
            currentTimeRange.start,
            currentTimeRange.end
          );
          return categoryMatch && dayMatch && timeMatch;
        });
      }

      function renderVenueLists(filtered) {
        const venueList = document.getElementById("venue-list");
        const mobileList = document.getElementById("mobile-venue-list");

        if (!filtered.length) {
          const emptyHtml = `
            <div class="empty-state rounded-2xl bg-slate-900/30 p-5 text-center">
              <p class="text-sm font-semibold text-slate-200">No venues match these filters.</p>
              <p class="mt-1 text-xs text-slate-400">Try widening the day or time range.</p>
            </div>
          `;
          venueList.innerHTML = emptyHtml;
          mobileList.innerHTML = emptyHtml;
          return;
        }

        const cardsHtml = filtered
          .map((venue) => createVenueCard(venue, venues.indexOf(venue)))
          .join("");

        venueList.innerHTML = cardsHtml;
        mobileList.innerHTML = cardsHtml;
      }

      function updateMapBounds(filtered) {
        if (!filtered.length) {
          map.setView([46.8721, -114.0085], 12);
          return;
        }

        const bounds = L.latLngBounds(filtered.map((venue) => [venue.lat, venue.lng]));
        map.fitBounds(bounds.pad(0.12), { maxZoom: 14 });
      }

      function updateMarkers({ fitBounds = false } = {}) {
        markers.forEach((marker) => map.removeLayer(marker));
        markers = [];

        const filtered = filterVenues();

        filtered.forEach((venue) => {
          const marker = L.marker([venue.lat, venue.lng], {
            icon: createCustomIcon(venue.category),
          }).bindPopup(createPopupContent(venue), {
            maxWidth: 320,
            className: "custom-popup",
          });

          marker.addTo(map);
          markers.push(marker);
        });

        document.getElementById("venue-count").textContent = filtered.length;
        document.getElementById("results-summary").textContent = getFiltersSummary(filtered.length);

        renderVenueLists(filtered);

        if (fitBounds) {
          updateMapBounds(filtered);
        }
      }

      function syncTimeSelects(startMinutes, endMinutes) {
        const startValue = `${String(Math.floor(startMinutes / 60)).padStart(2, "0")}:00`;
        const endValue = `${String(Math.floor(endMinutes / 60)).padStart(2, "0")}:00`;
        document.getElementById("start-time-filter").value = startValue;
        document.getElementById("end-time-filter").value = endValue;
      }

      function filterByNow() {
        const now = new Date();
        const dayNames = ["sunday", "monday", "tuesday", "wednesday", "thursday", "friday", "saturday"];
        const dayToday = dayNames[now.getDay()];
        const currentMinutes = now.getHours() * 60 + now.getMinutes();

        currentCategory = "all";
        currentDay = dayToday;
        currentTimeRange = { start: currentMinutes, end: currentMinutes };

        document.querySelectorAll(".filter-btn[data-category]").forEach((btn) => {
          if (btn.dataset.category === "all") {
            btn.classList.remove("bg-slate-700", "text-slate-300");
            btn.classList.add("bg-amber-500", "text-white", "active");
          } else {
            btn.classList.remove("bg-amber-500", "text-white", "active");
            btn.classList.add("bg-slate-700", "text-slate-300");
          }
        });

        document.getElementById("day-filter").value = dayToday;
        syncTimeSelects(currentMinutes, currentMinutes);
        updateMarkers({ fitBounds: true });
      }

      function filterByCategory(category) {
        currentCategory = category;

        document.querySelectorAll(".filter-btn[data-category]").forEach((btn) => {
          if (btn.dataset.category === category) {
            btn.classList.remove("bg-slate-700", "text-slate-300");
            btn.classList.add("bg-amber-500", "text-white", "active");
          } else {
            btn.classList.remove("bg-amber-500", "text-white", "active");
            btn.classList.add("bg-slate-700", "text-slate-300");
          }
        });

        updateMarkers({ fitBounds: true });
      }

      function filterByDay(day) {
        currentDay = day;
        updateMarkers({ fitBounds: true });
      }

      function updateTimeFilter() {
        const startTimeSelect = document.getElementById("start-time-filter");
        const endTimeSelect = document.getElementById("end-time-filter");

        const [startHour, startMin] = startTimeSelect.value.split(":").map(Number);
        const [endHour, endMin] = endTimeSelect.value.split(":").map(Number);

        currentTimeRange = {
          start: startHour * 60 + startMin,
          end: endHour * 60 + endMin,
        };

        updateMarkers({ fitBounds: true });
      }

      function focusVenue(index) {
        const venue = venues[index];
        map.setView([venue.lat, venue.lng], 16);

        const selectedMarker = markers.find((marker) => {
          const latlng = marker.getLatLng();
          return latlng.lat === venue.lat && latlng.lng === venue.lng;
        });

        if (selectedMarker) {
          selectedMarker.openPopup();
        }

        if (mobileOpen) {
          closeMobilePanel();
        }
      }

      function toggleMobilePanel() {
        const panel = document.getElementById("mobile-panel");
        if (mobileOpen) {
          panel.classList.add("translate-y-full");
          panel.classList.remove("translate-y-0");
        } else {
          panel.classList.remove("translate-y-full");
          panel.classList.add("translate-y-0");
        }
        mobileOpen = !mobileOpen;
      }

      function closeMobilePanel() {
        const panel = document.getElementById("mobile-panel");
        panel.classList.add("translate-y-full");
        panel.classList.remove("translate-y-0");
        mobileOpen = false;
      }

      function initFilterDefaults() {
        document.getElementById("start-time-filter").value = "00:00";
        document.getElementById("end-time-filter").value = "23:00";
      }

      function initMap() {
        map = L.map("map", {
          center: [46.8721, -114.0085],
          zoom: 13,
          zoomControl: true,
        });

        L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png", {
          attribution:
            '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
          subdomains: "abcd",
          maxZoom: 19,
        }).addTo(map);

        initFilterDefaults();
        updateMarkers({ fitBounds: true });
      }

      async function onConfigChange(config) {
        const mapTitle = config.map_title || defaultConfig.map_title;
        const subtitleText = config.subtitle_text || defaultConfig.subtitle_text;

        document.title = mapTitle;
        document.getElementById("map-title").textContent = mapTitle;
        document.getElementById("subtitle-text").textContent = subtitleText;
      }

      function mapToCapabilities() {
        return {
          recolorables: [],
          borderables: [],
          fontEditable: undefined,
          fontSizeable: undefined,
        };
      }

      function mapToEditPanelValues(config) {
        return new Map([
          ["map_title", config.map_title || defaultConfig.map_title],
          ["subtitle_text", config.subtitle_text || defaultConfig.subtitle_text],
        ]);
      }

      window.elementSdk.init({
        defaultConfig,
        onConfigChange,
        mapToCapabilities,
        mapToEditPanelValues,
      });

      initMap();
    </script>
  </body>
